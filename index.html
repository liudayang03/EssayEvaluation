<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文书硬核质检系统</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 30px auto; padding: 0 20px; background: #f9f9f9; }
        h1 { color: #1a1a1a; border-bottom: 3px solid #2563eb; padding-bottom: 10px; }
        textarea { width: 100%; height: 400px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 6px; cursor: pointer; margin: 10px 0; }
        button:hover { background: #1d4ed8; }
        #result { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 25px; margin-top: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); white-space: pre-wrap; line-height: 1.6; }
        .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>📄 文书硬核质检系统</h1>
    <textarea id="essay" placeholder="在此粘贴你的申请文书..."></textarea>
    <br>
    <button onclick="analyze()">开始审计</button>
    <div id="result"></div>

    <script>
        async function analyze() {
            const essay = document.getElementById('essay').value;
            const resultDiv = document.getElementById('result');
            if (!essay) return alert('请输入文书内容');

            resultDiv.textContent = '⏳ 审计中... (约5-8秒)';
            try {
                const res = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ essay })
                });
                const data = await res.json();
                if (data.error) {
                    resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                } else {
                    resultDiv.innerHTML = data.analysis.replace(/\n/g, '<br>');
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
